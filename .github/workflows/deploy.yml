name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      # Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Validate composer.json
      - name: Validate Composer
        run: composer validate --no-check-publish

      # Install PHP dependencies
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      # Create Laravel environment
      - name: Copy Env File
        run: cp .env.example .env

      # Generate APP_KEY
      - name: Generate App Key
        run: php artisan key:generate

      # Create SQLite database
      - name: Create SQLite Database
        run: |
          mkdir -p database
          touch database/database.sqlite

      # Run migrations
      - name: Run Migrations
        run: php artisan migrate --force

      # Install frontend dependencies
      - name: Install NPM Dependencies
        run: npm install

      # Build assets
      - name: Build Assets
        run: npm run build

      # Run tests (Deployment stops here if tests fail)
      - name: Execute Tests
        run: php artisan test

      # Deploy to production server
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /var/www/workhub.subhadip.online

            git pull origin main

            # Install dependencies without running hooks to avoid package uninstall / autoload mismatches
            composer install --no-dev --optimize-autoloader --no-scripts

            # Discover packages and clear caches
            php artisan package:discover --ansi
            php artisan optimize:clear
            php artisan view:clear

            # Run migrations
            php artisan migrate --force

            # Cache configurations and routes
            php artisan config:cache
            php artisan route:cache

      # Success email
      - name: Send Email Notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "✅ WorkHub Deployment Successful"
          to: code88068@gmail.com
          from: GitHub Actions
          body: |
            🚀 Deployment Successful

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}

            Commit Message:
            ${{ github.event.head_commit.message }}

            Commit SHA:
            ${{ github.sha }}

      # Failure email
      - name: Send Deployment Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "❌ WorkHub Deployment Failed"
          to: code88068@gmail.com
          from: GitHub Actions
          body: |
            ❌ Deployment Failed

            Repo: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}

            Commit Message:
            ${{ github.event.head_commit.message }}

            Commit SHA:
            ${{ github.sha }}

            Workflow Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}