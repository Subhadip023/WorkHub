name: WorkHub Production Pipeline Orchestrator

on:
  push:
    branches: [ "main" ]

jobs:
  # Job A: Call QA Workflow
  trigger_qa:
    uses: ./.github/workflows/ci-quality.yml

  # Job B: Call Deployment Workflow (Runs ONLY if QA Passes)
  trigger_deploy:
    needs: trigger_qa
    uses: ./.github/workflows/cd-deploy.yml
    secrets:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

  # Job C: Universal Notifications (Runs ALWAYS at the end)
  trigger_notifications:
    needs: [trigger_qa, trigger_deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      qa_status: ${{ needs.trigger_qa.result }}
      deploy_status: ${{ needs.trigger_deploy.result }}
      test_summary: ${{ needs.trigger_qa.outputs.test_summary || 'No test metrics evaluations returned.' }}
    secrets:
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}